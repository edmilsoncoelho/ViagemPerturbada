<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Blues da Rodovia</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      background: url('imagem.png') no-repeat center center/cover;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
    }

    .container {
      background: rgba(0, 0, 0, 0.6);
      padding: 30px;
      border-radius: 15px;
      width: 80%;
      max-width: 800px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    .player {
      margin-bottom: 30px;
    }

    button {
      padding: 10px 20px;
      margin: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #ff9800;
      color: white;
      font-weight: bold;
    }

    button:hover {
      background: #e68900;
    }

    input[type="range"] {
      width: 100%;
      margin-top: 10px;
    }

    .video-container {
      margin-top: 20px;
    }

    iframe {
      width: 100%;
      height: 300px;
      border-radius: 10px;
      border: none;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🎸 Blues da Rodovia</h1>

  <!-- Player de áudio -->
  <div class="player">
    <audio id="audio" src="musica.mp3"></audio>

    <button onclick="playAudio()">Play</button>
    <button onclick="pauseAudio()">Pause</button>

    <input type="range" id="progress" value="0" step="1">
  </div>

  <!-- Vídeo do YouTube -->
  <div class="video-container">
    <h2>🎥 Assista ao vídeo</h2>
    <iframe src="https://youtu.be/u_fSYEaqzVk?si=vasdQxXuXBKx9LpE"
            allowfullscreen>
    </iframe>
  </div>
</div>

<script>
  const audio = document.getElementById('audio');
  const progress = document.getElementById('progress');

  function playAudio() {
    audio.play();
  }

  function pauseAudio() {
    audio.pause();
  }

  // Atualiza barra de progresso
  audio.addEventListener('timeupdate', () => {
    progress.value = (audio.currentTime / audio.duration) * 100;
  });

  // Permite avançar na música
  progress.addEventListener('input', () => {
    audio.currentTime = (progress.value / 100) * audio.duration;
  });
</script>

</body>
</html>
